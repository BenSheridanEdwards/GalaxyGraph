name: Fallow

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # needed for comment/review-comments

jobs:
  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # best diff precision for --changed-since and hotspots
      - uses: fallow-rs/fallow@v2
        with:
          command: audit
          comment: true
          review-comments: true
      # Coverage-independent complexity gate. Fails only on NEW functions over the
      # cyclomatic/cognitive thresholds in .fallowrc.jsonc, beyond the committed
      # baseline. Burn the backlog down, then regenerate the baseline to lock gains.
      - name: Complexity gate
        uses: fallow-rs/fallow@v2
        with:
          command: health
          baseline: .fallow/health-baseline.json
          fail-on-issues: true
